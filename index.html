<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>✨ 日语单词记忆 · N1 / N2 梦幻小屋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Nunito:wght@500;600;700;800&family=ZCOOL+XiaoWei&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --surface: rgba(255, 248, 252, 0.72);
      --surface-back: linear-gradient(165deg, rgba(255, 249, 251, 0.85) 0%, rgba(243, 232, 255, 0.82) 55%, rgba(224, 242, 254, 0.8) 100%);
      --text: #4a1d5c;
      --muted: #8b5a9c;
      --accent: #d946ef;
      --known: #059669;
      --known-bg: linear-gradient(145deg, #ecfdf5, #d1fae5);
      --unknown: #db2777;
      --unknown-bg: linear-gradient(145deg, #fdf2f8, #fce7f3);
      --radius: 26px;
      --shadow: 0 16px 48px rgba(139, 92, 246, 0.18);
      --font-ui: "Nunito", "Hiragino Sans", system-ui, sans-serif;
      --font-zh: "ZCOOL XiaoWei", "PingFang SC", "Microsoft YaHei", serif;
      --font-jp: "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-ui);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(100px, env(safe-area-inset-bottom));
      background: linear-gradient(125deg, #ffd6e8, #e9d5ff, #c4d4ff, #fbcfe8, #ddd6fe);
      background-size: 400% 400%;
      animation: dreamyShift 22s ease-in-out infinite;
      background-attachment: fixed;
      position: relative;
    }

    @keyframes dreamyShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient span {
      position: absolute;
      top: -10%;
      font-size: clamp(0.65rem, 2.2vw, 0.95rem);
      opacity: 0.45;
      animation: floatFall linear infinite;
      will-change: transform;
    }

    @keyframes floatFall {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) translateX(18px) rotate(360deg);
      }
    }

    #studyView header,
    #homeView,
    main {
      position: relative;
      z-index: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      body {
        animation: none;
        background-size: 100% 100%;
      }
      .ambient span {
        animation: none;
        opacity: 0.2;
      }
      .card-rainbow {
        animation: none;
        background-size: 100% 100%;
      }
      .progress-bar-fill {
        animation: none;
      }
    }

    body.is-loading main,
    body.is-loading header,
    body.is-loading .mascot,
    body.is-loading #homeView,
    body.is-loading #studyView {
      visibility: hidden;
    }

    .boot-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      font-weight: 800;
      color: #86198f;
      z-index: 50;
      background: inherit;
    }

    .boot-screen.is-hidden {
      display: none;
    }

    .boot-spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.5);
      border-top-color: #d946ef;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .boot-error {
      max-width: 360px;
      line-height: 1.55;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .boot-error code {
      background: rgba(255, 255, 255, 0.7);
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    header {
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }

    .level-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .level-row .filter-btn {
      flex: 1;
      min-width: calc(25% - 8px);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-btn {
      flex: 1;
      min-width: 0;
      padding: 10px 8px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.55);
      color: #7c3aed;
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.9);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn:active {
      transform: scale(0.97);
    }

    .filter-btn.is-active {
      background: linear-gradient(145deg, #fdf4ff, #fce7f3);
      color: #86198f;
      box-shadow: 0 4px 0 #e9d5ff, 0 6px 14px rgba(147, 51, 234, 0.2);
    }

    .filter-btn.is-disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .filter-btn.fav-entry.is-active {
      background: linear-gradient(145deg, #fffbeb, #fef3c7);
      color: #b45309;
      box-shadow: 0 4px 0 #fde68a, 0 6px 14px rgba(245, 158, 11, 0.25);
    }

    .progress-bar {
      position: relative;
      height: 14px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 999px;
      overflow: visible;
      margin-bottom: 12px;
      box-shadow: inset 0 1px 4px rgba(244, 114, 182, 0.2);
      border: 1px solid rgba(251, 207, 232, 0.65);
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #fda4af 0%, #f9a8d4 25%, #f472b6 50%, #fb7185 75%, #fecdd3 100%);
      background-size: 200% 100%;
      animation: sakuraBarFlow 8s linear infinite;
      transition: width 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
      box-shadow: 0 0 12px rgba(244, 114, 182, 0.35);
    }

    @keyframes sakuraBarFlow {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 200% 50%;
      }
    }

    .progress-bar-sakura {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .progress-bar.is-blooming .progress-bar-sakura {
      opacity: 1;
    }

    .progress-bar.is-blooming .progress-bar-fill {
      box-shadow: 0 0 16px rgba(251, 113, 133, 0.65);
    }

    .sakura-petal {
      font-size: 0.72rem;
      animation: petalPop 0.6s ease-out both;
    }

    .progress-bar.is-blooming .sakura-petal {
      animation: petalSway 2s ease-in-out infinite;
    }

    @keyframes petalPop {
      from {
        transform: scale(0) translateY(4px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes petalSway {
      0%,
      100% {
        transform: translateY(0) rotate(-6deg);
      }
      50% {
        transform: translateY(-2px) rotate(6deg);
      }
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }

    .progress-count {
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .progress-count span {
      background: linear-gradient(90deg, #db2777, #9333ea);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .stats {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .stats strong {
      color: var(--text);
      font-weight: 800;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
    }

    .card-rainbow {
      position: relative;
      padding: 3px;
      border-radius: calc(var(--radius) + 8px);
      background: linear-gradient(120deg, #f9a8d4, #c084fc, #818cf8, #67e8f9, #86efac, #fde047, #f9a8d4);
      background-size: 300% 300%;
      animation: rainbowBorderFlow 10s linear infinite;
      box-shadow: var(--shadow);
    }

    @keyframes rainbowBorderFlow {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }

    .card-rainbow-inner {
      position: relative;
      border-radius: calc(var(--radius) + 5px);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .fav-pin {
      position: absolute;
      top: 8px;
      right: 10px;
      z-index: 25;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.35rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.22);
      transition: transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1), background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: hover) {
      .fav-pin:hover {
        transform: scale(1.06);
      }
    }

    .fav-pin:active {
      transform: scale(0.92);
    }

    .fav-pin.spin-once .ico {
      animation: favSpin 0.55s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    @keyframes favSpin {
      0% {
        transform: rotate(0deg) scale(1);
      }
      60% {
        transform: rotate(200deg) scale(1.15);
      }
      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    .fav-pin.is-on {
      background: linear-gradient(145deg, rgba(255, 251, 235, 0.9), rgba(254, 240, 138, 0.85));
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.35);
    }

    .fav-pin .ico {
      display: block;
      transition: transform 0.2s ease;
    }

    .fav-pin.is-on .ico {
      transform: scale(1.12);
      filter: drop-shadow(0 1px 2px rgba(180, 83, 9, 0.35));
    }

    .pos-badge {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      line-height: 1;
      opacity: 0.92;
      filter: drop-shadow(0 2px 4px rgba(255, 255, 255, 0.8));
      pointer-events: none;
    }

    .scene-wrap {
      position: relative;
      border-radius: var(--radius);
      overflow: visible;
    }

    .star-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: visible;
    }

    .star-particle {
      position: absolute;
      left: 50%;
      top: 50%;
      font-size: clamp(0.95rem, 3vw, 1.25rem);
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
      animation: starPop 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes starPop {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.1) rotate(var(--rot));
        opacity: 0;
      }
    }

    .scene {
      perspective: 1200px;
      min-height: 280px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-radius: var(--radius);
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 280px;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
      border-radius: var(--radius);
    }

    .scene.is-flipped .card {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: var(--surface);
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-top: 56px;
      text-align: center;
      overflow: hidden;
    }

    .face::before,
    .face::after {
      position: absolute;
      font-size: 1.1rem;
      opacity: 0.65;
      pointer-events: none;
    }

    .face::before {
      content: "✦";
      top: 14px;
      left: 16px;
      color: #f472b6;
    }

    .face::after {
      content: "✦";
      bottom: 14px;
      right: 18px;
      color: #a78bfa;
    }

    .face-decor {
      position: absolute;
      font-size: 0.95rem;
      opacity: 0.55;
      pointer-events: none;
    }

    .face-decor.br {
      bottom: 14px;
      left: 18px;
      color: #34d399;
    }

    .face-back {
      transform: rotateY(180deg);
      background: var(--surface-back);
      backdrop-filter: blur(14px) saturate(1.15);
      -webkit-backdrop-filter: blur(14px) saturate(1.15);
      align-items: stretch;
      justify-content: flex-start;
      padding: 18px 16px 20px;
      padding-top: 48px;
    }

    .back-scroll {
      width: 100%;
      max-height: min(62dvh, 480px);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 4px;
      text-align: left;
    }

    .rainbow-arc {
      position: absolute;
      top: -40px;
      left: 50%;
      width: 140%;
      height: 90px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at 50% 0%, rgba(251, 207, 232, 0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    .hint {
      font-size: 0.76rem;
      font-family: var(--font-ui);
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .chinese {
      font-family: var(--font-zh);
      font-size: clamp(1.45rem, 5.5vw, 2.15rem);
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0.04em;
    }

    .kanji-main {
      font-family: var(--font-jp);
      font-size: clamp(1.65rem, 6.5vw, 2.35rem);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
      text-align: center;
      color: var(--text);
    }

    .furigana-line {
      font-family: var(--font-jp);
      font-size: clamp(1.05rem, 3.8vw, 1.28rem);
      font-weight: 600;
      background: linear-gradient(90deg, #db2777, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 6px;
      font-size: 0.8rem;
      line-height: 1.45;
      font-family: var(--font-jp);
    }

    .meta-tag {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(244, 114, 182, 0.2);
      color: #9d174d;
      font-weight: 800;
      font-size: 0.65rem;
      font-family: var(--font-ui);
    }

    .meta-val {
      font-weight: 600;
      color: var(--text);
      font-size: 0.8rem;
    }

    .hosoku-line {
      font-family: var(--font-jp);
      font-size: 0.78rem;
      color: #6b21a8;
      font-weight: 500;
      margin: 4px 0 12px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px dashed rgba(192, 132, 252, 0.45);
      line-height: 1.55;
    }

    .hosoku-line.is-hidden,
    .example-block.is-hidden {
      display: none;
    }

    .example-block {
      margin-bottom: 12px;
      padding: 10px 12px 10px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(196, 181, 253, 0.35);
      border-left: 4px solid rgba(244, 114, 182, 0.55);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
    }

    .ex-label {
      font-size: 0.65rem;
      font-weight: 800;
      font-family: var(--font-ui);
      color: #a21caf;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    .ex-jp {
      font-family: var(--font-jp);
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.55;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .ex-furi {
      font-family: var(--font-jp);
      font-size: 0.72rem;
      color: #7c3aed;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .ex-zh {
      font-family: var(--font-zh);
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
      line-height: 1.5;
    }

    .tap-hint {
      margin-top: 18px;
      font-size: 0.76rem;
      font-family: var(--font-ui);
      color: #b48cc4;
      font-weight: 600;
    }

    .face-back .tap-hint {
      text-align: center;
      margin-top: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      padding: 14px 16px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active:not(.btn-known):not(.btn-unknown) {
      transform: scale(0.97);
    }

    .btn-known {
      background: var(--known-bg);
      color: var(--known);
      box-shadow: 0 6px 0 #6ee7b7, 0 8px 20px rgba(5, 150, 105, 0.25);
      transition: transform 0.15s cubic-bezier(0.34, 1.5, 0.64, 1), box-shadow 0.15s ease, filter 0.15s ease;
    }

    .btn-unknown {
      background: var(--unknown-bg);
      color: var(--unknown);
      box-shadow: 0 6px 0 #f9a8d4, 0 8px 20px rgba(219, 39, 119, 0.22);
      transition: transform 0.15s cubic-bezier(0.34, 1.5, 0.64, 1), box-shadow 0.15s ease, filter 0.15s ease;
    }

    @media (hover: hover) {
      .btn-known:hover,
      .btn-unknown:hover {
        filter: brightness(1.02);
        transform: scale(1.03);
      }
    }

    .btn-known:active,
    .btn-unknown:active {
      animation: btnBounce 0.38s cubic-bezier(0.34, 1.6, 0.64, 1);
    }

    @keyframes btnBounce {
      0% {
        transform: scale(1);
      }
      40% {
        transform: scale(0.94);
      }
      70% {
        transform: scale(1.04);
      }
      100% {
        transform: scale(1);
      }
    }

    .btn-reset {
      width: 100%;
      margin-top: 8px;
      background: linear-gradient(145deg, #faf5ff, #fce7f3);
      color: #86198f;
      font-weight: 800;
      padding: 13px;
      border-radius: 16px;
      box-shadow: 0 4px 0 #e9d5ff, 0 6px 16px rgba(147, 51, 234, 0.15);
    }

    .complete {
      text-align: center;
      padding: 36px 24px;
      background: linear-gradient(180deg, #ffffff 0%, #fdf4ff 100%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 3px solid rgba(255, 255, 255, 0.9);
    }

    .complete h2 {
      margin: 0 0 12px;
      font-size: 1.45rem;
      font-weight: 800;
    }

    .complete p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 600;
    }

    .complete .big-num {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      margin: 18px 0 10px;
    }

    .mascot {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;

      border: 2px solid #f9a8d4;

      pointer-events: none;
      text-align: center;
    }

    .mascot-bubble.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .mascot-body {
      font-size: clamp(2.6rem, 10vw, 3.25rem);
      line-height: 1;
      filter: drop-shadow(0 6px 12px rgba(139, 92, 246, 0.35));
      transform-origin: 50% 100%;

    @keyframes mascotIdle {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }

    .mascot.happy .mascot-body {
      animation: mascotJump 0.65s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    @keyframes mascotJump {
      0% {
        transform: translateY(0) scale(1, 1) rotate(0deg);
      }
      25% {
        transform: translateY(-28px) scale(1.08, 0.95) rotate(-6deg);

      50% {
        transform: translateY(-36px) scale(0.95, 1.08) rotate(6deg);
      }
      75% {
        transform: translateY(-12px) scale(1.05, 0.98) rotate(-3deg);
      }
      100% {
        transform: translateY(0) scale(1, 1) rotate(0deg);
      }
    }

    .mascot:not(.happy):not(.shake) .mascot-body {
      animation: mascotIdle 2.4s ease-in-out infinite;
    }

    .mascot.shake .mascot-body {
      animation: mascotShake 0.55s ease-in-out forwards;
    }

    @keyframes mascotShake {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      15% {
        transform: translateY(-4px) rotate(-14deg);
      }
      30% {

      }
      45% {
        transform: translateY(-3px) rotate(-10deg);

    function audioResume() {

    }

    function beep(freq, dur, type, vol) {
      try {
        audioResume();
        const ctx = audioCtx;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = type || "sine";
        o.frequency.setValueAtTime(freq, ctx.currentTime);
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(vol != null ? vol : 0.12, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + dur + 0.04);
      } catch (_) {}
    }

        audioResume();

        const t0 = ctx.currentTime + 0.01;
        [523.25, 659.25, 783.99].forEach((f, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = "triangle";
          o.frequency.value = f;
          const st = t0 + i * 0.08;
          g.gain.setValueAtTime(0, st);
          g.gain.linearRampToValueAtTime(0.09, st + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, st + 0.22);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(st);
          o.stop(st + 0.26);
        });
      } catch (_) {}
    }

    function playSwoosh() {

        audioResume();
        const ctx = audioCtx;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        const f = ctx.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.setValueAtTime(1100, ctx.currentTime);
        f.frequency.exponentialRampToValueAtTime(380, ctx.currentTime + 0.11);
        o.type = "triangle";
        o.frequency.setValueAtTime(480, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(160, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.055, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);
        o.connect(f);
        f.connect(g);
        g.connect(ctx.destination);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.15);
      } catch (_) {}
    }

    function playVictory() {
      const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
      try {
        audioResume();
        const ctx = audioCtx;
        let t = ctx.currentTime + 0.02;
        notes.forEach((freq) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = "sine";
          o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.1, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(t);
          o.stop(t + 0.3);
          t += 0.13;
        });
      } catch (_) {}
    }

    function posIconFromVocabType(vt) {
      const s = vt != null ? String(vt) : "";
      if (/擬|オノ|象声/.test(s)) return "🎵";
      if (/副/.test(s) && !/擬/.test(s)) return "🌊";
      if (/名|代|数/.test(s)) return "🏷️";
      if (/動|る|段|サ变|自五|他五|自他|他動|自動|ずる|じ/.test(s)) return "⚡";
      if (/形|ナ|イ形|い形|形容/.test(s)) return "🌸";
      return "✨";

      return `${w._lv}:${w.id}`;
    }

    function progressStorageKey(wk) {
      return `word_progress_${String(wk).replace(":", "_")}`;
    }

    function defaultProgress() {
      return { step: 0, nextReview: null, mastered: false };
    }

    function parseProgress(raw) {
      try {
        const o = JSON.parse(raw);
        return {
          step: Math.max(0, Math.min(6, Number(o.step) || 0)),
          nextReview: o.nextReview != null ? String(o.nextReview) : null,
          mastered: !!o.mastered
        };
      } catch {
        return defaultProgress();
      }
    }

    function getWordProgress(wk) {
      if (progressMem.has(wk)) return { ...progressMem.get(wk) };
      const raw = localStorage.getItem(progressStorageKey(wk));
      const p = raw ? parseProgress(raw) : defaultProgress();
      progressMem.set(wk, p);
      return { ...p };
    }

    function setWordProgress(wk, p) {
      progressMem.set(wk, { ...p });
      localStorage.setItem(progressStorageKey(wk), JSON.stringify(p));
    }

    function loadAllProgressKeysFromLS() {
      progressMem.clear();
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith("word_progress_")) continue;
        const suffix = k.slice("word_progress_".length);
        const us = suffix.indexOf("_");
        if (us === -1) continue;
        const wk = suffix.slice(0, us) + ":" + suffix.slice(us + 1);
        const raw = localStorage.getItem(k);
        progressMem.set(wk, raw ? parseProgress(raw) : defaultProgress());
      }
    }

    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function addDays(dateStr, n) {
      const [y, mo, da] = dateStr.split("-").map(Number);
      const dt = new Date(y, mo - 1, da);
      dt.setDate(dt.getDate() + n);
      const yy = dt.getFullYear();
      const mm = String(dt.getMonth() + 1).padStart(2, "0");
      const dd = String(dt.getDate()).padStart(2, "0");
      return `${yy}-${mm}-${dd}`;
    }

      } catch {
        return new Set();

    }

    function saveSession() {

        corpusSig: { ...corpusSig }

    function loadSession() {
      try {
        const raw = localStorage.getItem(LS_STUDY_SESSION);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (!o.corpusSig || o.corpusSig.n1 !== corpusSig.n1 || o.corpusSig.n2 !== corpusSig.n2) return null;
        return o;
      } catch {

    function matchesSubFilter(w, sub) {
      if (sub === CAT.all) return true;
      const c = w.category != null ? String(w.category) : "";
      if (sub === CAT.hikou) return c.includes("必考");
      if (sub === CAT.jotai) return c.includes("重点");
      return true;
    }

    function wordsForLevel(lv) {
      if (lv === "n1") return corpus.n1;
      if (lv === "n2") return corpus.n2;
      return corpus.n1.concat(corpus.n2);
    }

    function isDueWord(wk, today) {
      const p = getWordProgress(wk);
      if (p.mastered) return false;
      if (p.step < 1) return false;
      return !!(p.nextReview && p.nextReview <= today);
    }

    function countDueToday() {
      const t = todayStr();
      let n = 0;
      for (const wk of idMap.keys()) {
        if (isDueWord(wk, t)) n++;
      }
      return n;
    }

    function countMastered() {
      let n = 0;
      for (const wk of idMap.keys()) {
        if (getWordProgress(wk).mastered) n++;
      }
      return n;
    }

    function refreshHomeStats() {
      statNewToday.textContent = String(getTodayNewLearnCount());
      const due = countDueToday();
      statDueToday.textContent = String(due);
      statMastered.textContent = String(countMastered());
      btnStartDueToday.disabled = due === 0;
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildQueueKeys() {
      const t = todayStr();
      let list = [];
      if (learnMode === "new") {
        for (const w of wordsForLevel(levelMode)) {
          const wk = wordKey(w);
          const p = getWordProgress(wk);
          if (!p.mastered && p.step === 0 && matchesSubFilter(w, activeFilter)) list.push(wk);
        }
      } else if (learnMode === "due") {
        for (const w of wordsForLevel("all")) {
          const wk = wordKey(w);
          if (isDueWord(wk, t) && matchesSubFilter(w, activeFilter)) list.push(wk);
        }
      } else if (learnMode === "level") {
        for (const w of wordsForLevel(levelMode)) {
          const wk = wordKey(w);
          const p = getWordProgress(wk);
          if (!p.mastered && matchesSubFilter(w, activeFilter)) list.push(wk);
        }
      } else if (learnMode === "favorites") {
        for (const wk of favoriteSet) {
          const w = idMap.get(wk);
          if (!w) continue;
          const p = getWordProgress(wk);
          if (!p.mastered && matchesSubFilter(w, activeFilter)) list.push(wk);
        }
      }
      return shuffle(list);
    }

    function applyEbbinghausKnown(w) {
      const wk = wordKey(w);
      let p = getWordProgress(wk);
      const t = todayStr();
      if (p.mastered) return;
      if (p.step === 6 && p.nextReview && p.nextReview <= t) {
        p.mastered = true;
        p.nextReview = null;
        setWordProgress(wk, p);
        bumpReviewToday();
        return;
      }
      if (p.step === 6 && p.nextReview && p.nextReview > t) {
        return;
      }
      if (p.step === 0) {
        p.step = 1;
        p.nextReview = addDays(t, INTERVALS[0]);
        setWordProgress(wk, p);
        bumpNewLearnToday();
        return;
      }
      if (p.step < 6) {
        p.step++;
        p.nextReview = addDays(t, INTERVALS[p.step - 1]);
        setWordProgress(wk, p);
        bumpReviewToday();
      }
    }

    function applyEbbinghausUnknown(w) {
      const wk = wordKey(w);
      setWordProgress(wk, defaultProgress());
    }

        el.style.setProperty("--dx", Math.cos(angle) * dist + "px");
        el.style.setProperty("--dy", Math.sin(angle) * dist + "px");
        el.style.setProperty("--rot", (Math.random() * 80 - 40).toFixed(1) + "deg");
        starBurst.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }
    }

    function updateProgressUI() {
      const q = sessionBucket.queue.length;
      const ans = answeredTotal();
      queueNum.textContent = q;
      answeredNum.textContent = ans;
      const denom = ans + q;
      const pct = denom === 0 ? 0 : Math.min(100, (100 * ans) / denom);
      barFill.style.width = pct + "%";
      if (progressBarWrap) progressBarWrap.classList.toggle("is-blooming", pct >= 99.5);
      knownCountEl.textContent = sessionBucket.known;
      unknownCountEl.textContent = sessionBucket.unknown;

    function render() {
      mainArea.querySelector(".complete")?.remove();
      if (learnMode === "favorites" && favoriteSet.size === 0) {
        showFavoritesEmpty();
        return;
      }
      if (sessionBucket.queue.length === 0) {
        showComplete(false);
        return;
      }

      kanjiText.textContent = w.kanji || "";
      furiganaText.textContent = w.furigana || "";
      accentText.textContent = w.accent != null && String(w.accent).trim() ? String(w.accent) : "—";
      vocabTypeText.textContent = w.vocab_type != null && String(w.vocab_type).trim() ? String(w.vocab_type) : "—";

    function dequeueKnown() {
      if (sessionBucket.queue.length === 0) return;
      const w = getCurrentWord();
      sessionBucket.queue.shift();
      sessionBucket.known++;
      if (w) applyEbbinghausKnown(w);
      saveSession();
      afterAnswer();
    }

    function dequeueUnknown() {
      if (sessionBucket.queue.length === 0) return;
      const w = getCurrentWord();
      const id = sessionBucket.queue.shift();
      const pos = Math.min(REVIEW_GAP, sessionBucket.queue.length);
      sessionBucket.queue.splice(pos, 0, id);
      sessionBucket.unknown++;
      if (w) applyEbbinghausUnknown(w);
      saveSession();
      afterAnswer();
    }

    function afterAnswer() {

      if (learnMode === "favorites" && favoriteSet.size === 0) {

        return;

        showComplete(true);

    }

    function switchLevelInStudy(lv) {
      if (learnMode !== "new" && learnMode !== "level") return;
      if (lv === levelMode) return;
      levelMode = lv;
      setLevelUI();
      sessionBucket.queue = buildQueueKeys();
      sessionBucket.known = 0;
      sessionBucket.unknown = 0;
      saveSession();
      mainArea.querySelector(".complete")?.remove();
      confettiLayer.innerHTML = "";
      render();
    }

    scene.addEventListener("click", () => {
      if (sessionBucket.queue.length === 0) return;
      toggleFlip();
    });

    scene.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (sessionBucket.queue.length > 0) toggleFlip();
      }
    });

    favBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleFavorite();
    });

    btnKnown.addEventListener("click", () => {
      if (sessionBucket.queue.length === 0) return;
      playDing();
      mascotReact("known");
      dequeueKnown();
    });

    btnUnknown.addEventListener("click", () => {
      if (sessionBucket.queue.length === 0) return;
      playThud();
      mascotReact("unknown");
      dequeueUnknown();
    });

    btnReset.addEventListener("click", () => {
      sessionBucket.queue = buildQueueKeys();
      sessionBucket.known = 0;
      sessionBucket.unknown = 0;
      saveSession();
      mainArea.querySelector(".complete")?.remove();
      confettiLayer.innerHTML = "";
      render();
    });

    filterRow.addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      const f = btn.getAttribute("data-filter");
      if (!f) return;
      applyCategoryFilter(f, false);
    });

    levelRow.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-level]");
      if (!btn) return;
      const lv = btn.getAttribute("data-level");
      if (lv === "n1" || lv === "n2" || lv === "all") switchLevelInStudy(lv);
    });

    btnBackHome.addEventListener("click", () => {
      showHomeView();
    });

    btnStartDueToday.addEventListener("click", () => {
      startSessionFromMode("due", false);
    });

    homeView.querySelectorAll("[data-enter]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const m = btn.getAttribute("data-enter");
        if (m === "new" || m === "due" || m === "level" || m === "favorites") {
          if (m === "due") startSessionFromMode("due", false);
          else if (m === "favorites") startSessionFromMode("favorites", false);
          else startSessionFromMode(m, true);
        }
      });
    });

    homeLevelRow.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-home-level]");
      if (!btn) return;
      const lv = btn.getAttribute("data-home-level");
      if (lv === "n1" || lv === "n2" || lv === "all") {
        homeLevel = lv;
        setHomeLevelUI();
      }
    });

    btnFavRestart.addEventListener("click", () => {
      if (
        !confirm(
          "确定要重新开始吗？学习记录将被清除"
        )
      ) {
        return;
      }
      for (const wk of favoriteSet) {
        localStorage.removeItem(progressStorageKey(wk));
        progressMem.delete(wk);
      }
      sessionBucket.queue = buildQueueKeys();
      sessionBucket.known = 0;
      sessionBucket.unknown = 0;
      saveSession();
      refreshHomeStats();
      mainArea.querySelector(".complete")?.remove();
      confettiLayer.innerHTML = "";
      render();
    });

    async function boot() {
      try {
        const [r1, r2] = await Promise.all([fetch(URL_N1), fetch(URL_N2)]);
        if (!r1.ok) throw new Error("N1 HTTP " + r1.status);
        if (!r2.ok) throw new Error("N2 HTTP " + r2.status);
        corpus.n1 = await r1.json();
        corpus.n2 = await r2.json();
        if (!Array.isArray(corpus.n1) || !Array.isArray(corpus.n2)) throw new Error("词库格式错误");
        if (corpus.n1.length === 0 && corpus.n2.length === 0) throw new Error("词库为空");

        idMap = new Map();
        for (const w of corpus.n1) {
          w._lv = "n1";
          idMap.set(wordKey(w), w);
        }
        for (const w of corpus.n2) {
          w._lv = "n2";
          idMap.set(wordKey(w), w);
        }
        corpusSig = { n1: corpus.n1.length, n2: corpus.n2.length };

        migrateLegacyFavorites();
        favoriteSet = loadFavoritesFromLS();
        loadAllProgressKeysFromLS();

        setHomeLevelUI();
        setFilterUI();
        setLevelUI();

        bootScreen.classList.add("is-hidden");
        document.body.classList.remove("is-loading");
        homeView.classList.remove("view-hidden");
        studyView.classList.add("view-hidden");
        refreshHomeStats();

        const s = loadSession();
        const okMode = s && (s.learnMode === "new" || s.learnMode === "due" || s.learnMode === "level" || s.learnMode === "favorites");
        if (okMode && Array.isArray(s.queue) && s.queue.length > 0) {
          learnMode = s.learnMode;
          levelMode =
            s.levelMode === "n1" || s.levelMode === "n2" || s.levelMode === "all" ? s.levelMode : "n1";
          activeFilter =
            s.activeFilter === CAT.all || s.activeFilter === CAT.hikou || s.activeFilter === CAT.jotai
              ? s.activeFilter
              : CAT.all;
          sessionBucket = {
            queue: s.queue.map(String),
            known: Number(s.known) || 0,
            unknown: Number(s.unknown) || 0
          };
          setFilterUI();
          setLevelUI();
          updateStudyChrome();
          showStudyView();
          render();
        }
        startEncourageLoop();
      } catch (err) {
        bootError.classList.remove("is-hidden");
        bootError.innerHTML =
          "无法加载 <code>words_n1.json</code> / <code>words_n2.json</code>。若直接双击打开 HTML，浏览器会拦截本地文件请求。<br /><br />请在本目录运行本地服务器，例如：<br /><code>npx serve .</code> 或 <code>python3 -m http.server</code><br /><br />然后再用浏览器访问页面。";
        document.body.classList.remove("is-loading");
        console.error(err);
      }
    }

    boot();

  </script>
</body>
</html>
